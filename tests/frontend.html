<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TestSuite | En Territorio Verde</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .test { margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        .pass { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .fail { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .summary { font-weight: bold; margin-top: 20px; font-size: 1.2rem; }
        h1 { color: #006b3f; }
    </style>
</head>
<body>
    <h1>Protocolo de Pruebas Frontend 🧪</h1>
    <div id="results">Ejecutando pruebas...</div>
    <div id="summary" class="summary"></div>

    <!-- Mocks for testing -->
    <div style="display:none">
        <audio id="stream"></audio>
        <button id="btnLive"></button>
        <span id="liveText"></span>
        <div id="liveIndicator"></div>
        <span id="liveStatus"></span>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passed = 0;
        let total = 0;

        function assert(condition, message) {
            total++;
            const div = document.createElement('div');
            div.className = 'test ' + (condition ? 'pass' : 'fail');
            div.innerHTML = (condition ? '✅ ' : '❌ ') + message;
            results.appendChild(div);
            if (condition) passed++;
        }

        async function runTests() {
            results.innerHTML = "";
            
            // PRUEBA 1: Estado Inicial de RadioApp
            assert(typeof RadioApp === "object", "RadioApp está definido y cargado.");

            // PRUEBA 2: Sincronización de Interfaz (Play)
            RadioApp.updatePlayState(true);
            const btn = document.getElementById('btnLive');
            assert(btn.classList.contains('playing'), "El botón 'En Vivo' se activa correctamente.");
            assert(document.getElementById('liveText').textContent.includes('En Vivo'), "El texto cambia a 'En Vivo'.");

            // PRUEBA 3: Sincronización de Interfaz (Pause)
            RadioApp.updatePlayState(false);
            assert(!btn.classList.contains('playing'), "El botón 'En Vivo' se desactiva al pausar.");

            // PRUEBA 4: Persistencia en LocalStorage
            localStorage.setItem('audioIsPlaying', 'true');
            assert(localStorage.getItem('audioIsPlaying') === 'true', "Estado guardado en LocalStorage.");

            // PRUEBA 5: Lógica del Carrusel (Movimiento)
            RadioApp.slideIndex = 0;
            // Mocking slides for test
            const container = document.createElement('div');
            container.id = 'carousel-slides';
            container.innerHTML = '<div class="slide"></div><div class="slide"></div>';
            document.body.appendChild(container);
            
            RadioApp.moveSlide(1);
            assert(RadioApp.slideIndex === 1, "El carrusel avanza de posición correctamente.");
            document.body.removeChild(container);

            // PRUEBA 6: Configuración Global
            assert(typeof APP_CONFIG === "object", "La configuración global de la APP está íntegra.");
            assert(APP_CONFIG.SIGNAL_URL.startsWith('http'), "La URL de la señal de audio es válida.");

            // RESUMEN
            summary.innerHTML = `Resultados: ${passed} de ${total} pruebas pasadas.`;
            summary.style.color = (passed === total) ? '#155724' : '#721c24';
        }

        // Ejecutar tras un breve delay para asegurar carga de DOM
        setTimeout(runTests, 500);
    </script>
</body>
</html>
